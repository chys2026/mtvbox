name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        variant: [java, java32, java64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 ndk;25.2.9519653'
       
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
       
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build with Gradle
      run: ./gradlew assemble${{ matrix.variant }}Debug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TVBox-${{ matrix.variant }}-debug
        path: app/build/outputs/apk/${{ matrix.variant }}/debug/TVBox_debug-${{ matrix.variant }}.apk
        retention-days: 30
        
  build-python:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        variant: [python32, python64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 ndk;25.2.9519653'
       
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
       
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build with Gradle (Python variants)
      run: ./gradlew assemble${{ matrix.variant }}Debug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TVBox-${{ matrix.variant }}-debug
        path: app/build/outputs/apk/${{ matrix.variant }}/debug/TVBox_debug-${{ matrix.variant }}.apk
        retention-days: 30
        
  build-release:
    runs-on: ubuntu-latest
    needs: [build, build-python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
       
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 ndk;25.2.9519653 build-tools;34.0.0'
       
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
       
    - name: Build Release APKs
      run: |
        ./gradlew assembleJavaRelease
        ./gradlew assembleJava32Release
        ./gradlew assembleJava64Release
        
    - name: Sign Release APKs
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"
        
    - name: Upload Release APKs
      uses: actions/upload-artifact@v4
      with:
        name: TVBox-release
        path: ${{steps.sign_app.outputs.signedReleaseFile}}
        retention-days: 90
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          app/build/outputs/apk/java/release/*.apk
          app/build/outputs/apk/java32/release/*.apk
          app/build/outputs/apk/java64/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}